<div style="width:100%; height:100%; position:relative; background:white; color:var(--text-dark); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:6%; text-align:center;">
    <h1 style="font-size:5vw; color:var(--primary); margin:0; font-weight:900;">{{ slide.data.quote or 'Givers Gain®' }}</h1>
    <div style="width:140px; height:4px; background:var(--text-dark); margin:2rem auto;"></div>
    <h3 style="font-size:1.8vw; color:#666;">Meeting Adjourned</h3>
    <p style="font-size:1.3vw; margin-top:0.6rem;">See you next week: <strong>{{ slide.data.next_meeting_date or 'Wednesday' }}</strong></p>
    <div style="margin-top:3rem; opacity:0.55;">
        <div style="font-size:1vw; text-transform:uppercase; letter-spacing:5px; font-weight:700;">{{ chapter.name }} Chapter</div>
        <div style="font-size:0.9vw; margin-top:0.4rem; font-style:italic;">Changing the way the world does business®</div>
    </div>
    <div class="swoosh-container" style="opacity:0.4;">
        <div class="swoosh-light"></div>
        <div class="swoosh-dark"></div>
    </div>
</div>
