<div style="text-align: center;">
    <h1 style="font-size: 4rem; color: #FFD700; text-shadow: 0 0 20px rgba(255,215,0,0.3);">Gold Club Members</h1>
    <p style="font-size: 1.5rem; opacity: 0.7; margin-bottom: 4rem;">Recognition for members who have sponsored 6+ members into BNI.</p>
    
    <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 3rem;">
        {% for member in slide.data.members %}
        <div style="text-align: center;">
            <div style="width: 180px; height: 180px; border-radius: 50%; padding: 8px; background: linear-gradient(45deg, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C); margin-bottom: 1.5rem;">
                <img src="{{ member.photo_url or 'https://ui-avatars.com/api/?name=' + member.full_name }}" 
                     style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 4px solid #1a1a1a;">
            </div>
            <div style="font-size: 1.5rem; font-weight: bold;">{{ member.full_name }}</div>
        </div>
        {% endfor %}
    </div>
</div>
