<div style="width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center;">
    <h2 style="color: var(--bni-red); margin-bottom: 2rem;">{{ slide.data.video_title or 'Welcome to BNI' }}</h2>
    <div style="width: 80%; aspect-ratio: 16/9; background: #000; border: 2px solid #333; display: flex; align-items: center; justify-content: center; border-radius: 20px; overflow: hidden;">
        {% if slide.data.video_id %}
            <iframe width="100%" height="100%" src="https://www.youtube.com/embed/{{ slide.data.video_id }}?autoplay=0" frameborder="0" allowfullscreen></iframe>
        {% else %}
            <div style="text-align: center; opacity: 0.5;">
                <svg width="100" height="100" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                <p>Video Placeholder</p>
            </div>
        {% endif %}
    </div>
</div>
