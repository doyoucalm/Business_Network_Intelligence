<div style="width: 90%; max-width: 1200px;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 4rem;">
        <h1 style="font-size: 4rem; color: var(--bni-red);">Vice President's Report</h1>
        <div style="background: #333; padding: 1rem 2rem; border-radius: 15px; font-size: 1.5rem;">
            Week {{ slide.data.week_number }}
        </div>
    </div>
    
    <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 2rem;">
        <div style="background: rgba(255,255,255,0.05); padding: 2.5rem; border-radius: 20px; text-align: center;">
            <div style="font-size: 4rem; font-weight: bold;">{{ slide.data.stats.present }}</div>
            <div style="opacity: 0.5; text-transform: uppercase; letter-spacing: 2px;">Present</div>
        </div>
        <div style="background: rgba(255,255,255,0.05); padding: 2.5rem; border-radius: 20px; text-align: center;">
            <div style="font-size: 4rem; font-weight: bold;">{{ slide.data.stats.absent }}</div>
            <div style="opacity: 0.5; text-transform: uppercase; letter-spacing: 2px;">Absent</div>
        </div>
        <div style="background: rgba(255,255,255,0.05); padding: 2.5rem; border-radius: 20px; text-align: center;">
            <div style="font-size: 4rem; font-weight: bold;">{{ slide.data.stats.subs }}</div>
            <div style="opacity: 0.5; text-transform: uppercase; letter-spacing: 2px;">Subs</div>
        </div>
        <div style="background: rgba(255,255,255,0.05); padding: 2.5rem; border-radius: 20px; text-align: center;">
            <div style="font-size: 4rem; font-weight: bold;">{{ slide.data.stats.visitors }}</div>
            <div style="opacity: 0.5; text-transform: uppercase; letter-spacing: 2px;">Visitors</div>
        </div>
    </div>
    
    <div style="margin-top: 4rem; padding: 3rem; background: rgba(207,32,48,0.1); border-radius: 20px; border-left: 10px solid var(--bni-red);">
        <h3 style="margin-top: 0; color: var(--bni-red);">VP Message:</h3>
        <p style="font-size: 1.8rem; margin-bottom: 0;">{{ slide.data.vp_message or 'Keep up the great momentum, Mahardika!' }}</p>
    </div>
</div>
