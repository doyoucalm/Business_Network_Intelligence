<div style="text-align: center;">
    <h1 style="font-size: 3rem; color: var(--bni-red); margin-bottom: 1rem;">Welcome to the Family!</h1>
    <p style="font-size: 1.5rem; opacity: 0.7; margin-bottom: 4rem;">Inducting our newest member(s) into BNI Mahardika.</p>
    
    <div style="display: flex; justify-content: center; gap: 4rem;">
        {% for member in slide.data.members %}
        <div style="text-align: center; transform: scale(1.2);">
            <div style="width: 200px; height: 200px; margin-bottom: 2rem; position: relative;">
                <img src="{{ member.photo_url or 'https://ui-avatars.com/api/?name=' + member.full_name }}" 
                     style="width: 100%; height: 100%; border-radius: 20px; object-fit: cover; border: 5px solid var(--bni-red);">
                <div style="position: absolute; top: -20px; right: -20px; background: white; color: var(--bni-red); width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; box-shadow: 0 10px 20px rgba(0,0,0,0.3);">✨</div>
            </div>
            <div style="font-size: 2rem; font-weight: bold;">{{ member.full_name }}</div>
            <div style="font-size: 1.2rem; color: var(--bni-red); font-weight: bold;">{{ member.classification }}</div>
            <div style="font-size: 1.1rem; opacity: 0.6; margin-top: 0.5rem;">{{ member.company }}</div>
        </div>
        {% endfor %}
    </div>
</div>
