<div style="width: 90%; max-width: 1200px;">
    <h1 style="color: var(--bni-red); margin-bottom: 3rem; border-bottom: 4px solid var(--bni-red); display: inline-block;">Announcements & Events</h1>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 3rem;">
        {% for event in slide.data.events %}
        <div style="background: rgba(255,255,255,0.05); padding: 2.5rem; border-radius: 25px; display: flex; gap: 2rem; align-items: center;">
            <div style="background: var(--bni-red); width: 100px; height: 100px; border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0;">
                <div style="font-size: 0.8rem; font-weight: bold; text-transform: uppercase;">{{ event.month }}</div>
                <div style="font-size: 2.5rem; font-weight: 900;">{{ event.day }}</div>
            </div>
            <div>
                <h3 style="margin: 0; font-size: 1.8rem;">{{ event.title }}</h3>
                <p style="opacity: 0.6; margin: 0.5rem 0 0 0; font-size: 1.2rem;">{{ event.time }} | {{ event.location }}</p>
            </div>
        </div>
        {% endfor %}
        {% if not slide.data.events %}
            <div style="grid-column: span 2; background: rgba(255,255,255,0.05); padding: 4rem; border-radius: 25px; text-align: center; opacity: 0.3;">
                <div style="font-size: 4rem; margin-bottom: 1rem;">📅</div>
                <h2>Check BNI Connect for latest regional events</h2>
            </div>
        {% endif %}
    </div>
</div>
