<div style="width: 95%; height: 90%;">
    <h1 style="color: var(--bni-red); text-align: center; margin-bottom: 3rem;">Leadership Team & Support Team</h1>
    <div style="display: grid; grid-template-columns: repeat(6, 1fr); gap: 1.5rem;">
        {% for role in slide.data.roles %}
        <div style="text-align: center;">
            <div style="position: relative; margin-bottom: 0.8rem;">
                <img src="{{ role.photo_url or 'https://ui-avatars.com/api/?name=' + role.name + '&background=333&color=fff' }}"
                     style="width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 15px; border: 2px solid #444;">
                <div style="position: absolute; bottom: -10px; left: 10%; right: 10%; background: var(--bni-red); font-size: 0.7rem; padding: 2px; border-radius: 5px; text-transform: uppercase; font-weight: bold;">
                    {{ role.role }}
                </div>
            </div>
            <div style="font-size: 0.9rem; font-weight: bold; margin-top: 10px;">{{ role.name }}</div>
        </div>
        {% endfor %}
    </div>
</div>
