<div style="width:100%; height:100%; position:relative; background:white;">
    <div style="background:var(--primary); height:75%; position:relative; display:flex; justify-content:center; align-items:center; overflow:hidden;">
        <div class="bni-logo-main" style="position:absolute; top:8%; font-size:5.5vw; color:white;">BNI</div>
        <img src="https://upload.wikimedia.org/wikipedia/commons/8/80/World_map_-_low_resolution.svg" style="width:70%; opacity:0.22; filter:brightness(0) invert(1);">
    </div>
    <div style="background:white; height:25%; display:flex; justify-content:space-around; align-items:center; padding:0 5%; border-top:8px solid #f0f0f0;">
        <div style="text-align:center;">
            <h3 style="color:var(--primary); font-size:3.2vw; font-weight:800;">{{ slide.data.members or '340,000+' }}</h3>
            <p style="font-size:1.3vw; font-weight:600; color:#555;">Global Members</p>
        </div>
        <div style="text-align:center;">
            <h3 style="color:var(--primary); font-size:3.2vw; font-weight:800;">{{ slide.data.chapters or '11,300+' }}</h3>
            <p style="font-size:1.3vw; font-weight:600; color:#555;">Global Chapters</p>
        </div>
        <div style="text-align:center;">
            <h3 style="color:var(--primary); font-size:3.2vw; font-weight:800;">{{ slide.data.countries or '76' }}</h3>
            <p style="font-size:1.3vw; font-weight:600; color:#555;">Countries</p>
        </div>
    </div>
</div>
