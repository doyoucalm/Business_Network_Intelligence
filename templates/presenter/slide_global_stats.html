<div style="width: 90%; max-width: 1200px; text-align: center;">
    <h1 style="font-size: 4rem; margin-bottom: 4rem; color: var(--bni-red);">BNI By The Numbers</h1>
    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 3rem;">
        <div style="background: rgba(255,255,255,0.05); padding: 3rem; border-radius: 20px; border-bottom: 8px solid var(--bni-red);">
            <div style="font-size: 4.5rem; font-weight: bold; color: white;">{{ global_stats.members or '314,000+' }}</div>
            <div style="font-size: 1.5rem; opacity: 0.6; margin-top: 1rem; text-transform: uppercase; letter-spacing: 2px;">Members Worldwide</div>
        </div>
        <div style="background: rgba(255,255,255,0.05); padding: 3rem; border-radius: 20px; border-bottom: 8px solid var(--bni-red);">
            <div style="font-size: 4.5rem; font-weight: bold; color: white;">{{ global_stats.chapters or '10,900+' }}</div>
            <div style="font-size: 1.5rem; opacity: 0.6; margin-top: 1rem; text-transform: uppercase; letter-spacing: 2px;">Chapters</div>
        </div>
        <div style="background: rgba(255,255,255,0.05); padding: 3rem; border-radius: 20px; border-bottom: 8px solid var(--bni-red);">
            <div style="font-size: 4.5rem; font-weight: bold; color: white;">{{ global_stats.countries or '77' }}</div>
            <div style="font-size: 1.5rem; opacity: 0.6; margin-top: 1rem; text-transform: uppercase; letter-spacing: 2px;">Countries</div>
        </div>
    </div>
    <div style="margin-top: 4rem; font-size: 1.8rem; opacity: 0.8;">
        Givers Gain® is more than just a slogan, it's a worldwide movement.
    </div>
</div>
