<div style="text-align: center; width: 95%;">
    <h1 style="font-size: 4rem; color: #4CAF50; margin-bottom: 1rem;">Green Zone Members</h1>
    <p style="font-size: 1.5rem; opacity: 0.7; margin-bottom: 4rem;">Elite performance: Members scoring 70+ on the Traffic Light Report.</p>
    
    <div style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 2rem;">
        {% for member in slide.data.members %}
        <div style="background: rgba(76, 175, 80, 0.1); padding: 1.5rem; border-radius: 20px; border: 2px solid #4CAF50;">
            <img src="{{ member.photo_url or 'https://ui-avatars.com/api/?name=' + member.full_name }}" 
                 style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid #4CAF50; margin-bottom: 1rem;">
            <div style="font-weight: bold; font-size: 1.1rem;">{{ member.full_name }}</div>
            <div style="font-size: 1.5rem; font-weight: 900; color: #4CAF50; margin-top: 5px;">{{ member.score }}</div>
        </div>
        {% endfor %}
    </div>
</div>
