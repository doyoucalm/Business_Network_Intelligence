<div style="width: 90%; max-width: 1300px; display: grid; grid-template-columns: 1fr 1.5fr; gap: 4rem; align-items: center;">
    <div style="text-align: center;">
        <div style="font-size: 1.5rem; text-transform: uppercase; letter-spacing: 5px; opacity: 0.6; margin-bottom: 2rem;">Feature Presentation</div>
        <img src="{{ slide.data.member.photo_url or 'https://ui-avatars.com/api/?name=' + slide.data.member.full_name }}" 
             style="width: 350px; height: 350px; border-radius: 50%; object-fit: cover; border: 8px solid var(--bni-red); box-shadow: 0 20px 40px rgba(0,0,0,0.5);">
        <h1 style="font-size: 3rem; margin-top: 2rem;">{{ slide.data.member.full_name }}</h1>
        <div style="font-size: 1.5rem; color: var(--bni-red); font-weight: bold;">{{ slide.data.member.classification }}</div>
    </div>
    <div style="background: rgba(255,255,255,0.05); padding: 4rem; border-radius: 40px;">
        <h2 style="font-size: 3.5rem; margin-top: 0; color: var(--bni-red);">{{ slide.data.title or '10 Minute Presentation' }}</h2>
        <p style="font-size: 1.8rem; line-height: 1.6; opacity: 0.8;">
            {{ slide.data.description or 'Please prepare your questions for the Q&A session after the presentation.' }}
        </p>
        <div style="margin-top: 3rem; display: flex; gap: 1rem;">
            <div style="background: var(--bni-red); color: white; padding: 1rem 2rem; border-radius: 15px; font-size: 1.5rem; font-weight: bold;">10:00</div>
            <div style="border: 2px solid #444; color: white; padding: 1rem 2rem; border-radius: 15px; font-size: 1.5rem; font-weight: bold;">Q&A: 2:00</div>
        </div>
    </div>
</div>
