<div style="width:100%; height:100%; position:relative; background:white; color:var(--text-dark); display:flex; flex-direction:column;">
    <div style="flex:1; display:flex; align-items:center; justify-content:center; padding:5%; position:relative;">
        <div style="text-align:center; z-index:5;">
            <p style="color:var(--primary); font-weight:700; font-size:1.4vw; letter-spacing:6px; margin-bottom:1rem;">BNI {{ chapter.name|upper }} CHAPTER</p>
            <h1 style="font-size:6vw; line-height:1.05; font-weight:900; color:var(--text-dark); margin:0;">{{ slide.data.theme or 'Weekly Meeting' }}</h1>
            <h2 style="font-size:2vw; margin-top:1.5rem; padding-top:1rem; border-top:3px solid var(--primary); display:inline-block; color:#444;">{{ meeting.meeting_date }}</h2>
            <p style="margin-top:1.2rem; font-style:italic; color:#888; font-size:1.2vw;">Welcome to the most productive meeting of your week.</p>
        </div>
    </div>
    <div class="swoosh-container">
        <div class="swoosh-light"></div>
        <div class="swoosh-dark"></div>
    </div>
    <div class="bni-logo-main corner-bni" style="color:white;">BNI</div>
</div>
