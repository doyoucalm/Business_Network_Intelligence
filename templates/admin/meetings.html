<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Meeting - {{ chapter.name }}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body { padding: 2rem; max-width: 800px; margin: 0 auto; font-family: sans-serif; }
        h1 { color: var(--bni-red); }
        .form-group { margin-bottom: 1rem; text-align: left; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: bold; }
        .form-group input, .form-group select { width: 100%; padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px; }
        .btn { padding: 0.7rem 1.5rem; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-primary { background: var(--bni-red); color: white; }
        .meeting-list { margin-top: 2rem; border-collapse: collapse; width: 100%; }
        .meeting-list th, .meeting-list td { border: 1px solid #ddd; padding: 0.8rem; text-align: left; }
        .meeting-list th { background: #f4f4f4; }
        .actions { display: flex; gap: 0.5rem; }
    </style>
</head>
<body>
    <div style="margin-bottom: 1rem;">
        <a href="/" style="text-decoration: none; color: #666;">&larr; Kembali ke Home</a>
    </div>
    <h1>Manajemen Meeting</h1>
    
    <div style="background: var(--card-bg, #f9f9f9); padding: 1.5rem; border-radius: 8px; border: 1px solid var(--border-color, #ddd); margin-bottom: 2rem;">
        <h3>Buat Meeting Baru</h3>
        <form id="createMeetingForm">
            <div class="form-group">
                <label>Tanggal Meeting</label>
                <input type="date" name="meeting_date" required id="meeting_date">
            </div>
            <div class="form-group">
                <label>Tema / Title</label>
                <input type="text" name="theme" placeholder="Contoh: Visitors Day" id="theme">
            </div>
            <div class="form-group">
                <label>Feature Presenter</label>
                <select name="feature_presenter_id" id="feature_presenter_id">
                    <option value="">-- Pilih Member --</option>
                    {% for m in members %}
                    <option value="{{ m.id }}">{{ m.full_name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Feature Title</label>
                <input type="text" name="feature_title" placeholder="Judul Presentasi" id="feature_title">
            </div>
            <button type="submit" class="btn btn-primary">Simpan Meeting</button>
        </form>
    </div>

    <table class="meeting-list">
        <thead>
            <tr>
                <th>Tanggal</th>
                <th>Tema</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody>
            {% for m in meetings %}
            <tr>
                <td>{{ m.meeting_date }}</td>
                <td>{{ m.meta.get('theme', '-') }}</td>
                <td class="actions">
                    <a href="/admin/meetings/{{ m.id }}/attendance" class="btn" style="background: #28a745; color: white; text-decoration: none; padding: 0.4rem 0.8rem; font-size: 0.9rem;">Presensi</a>
                    <a href="/presenter/{{ m.id }}" class="btn" style="background: #007bff; color: white; text-decoration: none; padding: 0.4rem 0.8rem; font-size: 0.9rem;">Slides</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <script>
        document.getElementById('createMeetingForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                meeting_date: document.getElementById('meeting_date').value,
                theme: document.getElementById('theme').value,
                feature_presenter_id: document.getElementById('feature_presenter_id').value,
                feature_title: document.getElementById('feature_title').value
            };
            
            const res = await fetch('/api/admin/meetings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            
            if (res.ok) {
                location.reload();
            } else {
                const err = await res.json();
                alert('Gagal menyimpan meeting: ' + (err.detail || 'Unknown error'));
            }
        });
    </script>
</body>
</html>
