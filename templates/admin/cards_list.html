<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Cards - {{ chapter.name }}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body { padding: 2rem; max-width: 1000px; margin: 0 auto; font-family: sans-serif; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .member-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1.5rem; }
        .member-card { 
            background: white; border: 1px solid #ddd; border-radius: 12px; padding: 1.5rem; text-align: center;
            text-decoration: none; color: inherit; transition: all 0.2s; position: relative;
        }
        .member-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); border-color: var(--bni-red); }
        .status-dot { width: 15px; height: 15px; border-radius: 50%; position: absolute; top: 10px; right: 10px; }
        .status-green { background: #28a745; }
        .status-yellow { background: #ffc107; }
        .status-red { background: #dc3545; }
        .avatar { width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 1rem; background: #eee; overflow: hidden; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.5rem; color: #777; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .name { font-weight: bold; font-size: 1rem; margin-bottom: 0.3rem; }
        .classification { font-size: 0.85rem; color: #666; }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <a href="/" style="text-decoration: none; color: #666;">&larr; Kembali</a>
            <h1 style="margin: 0.5rem 0;">Member Card Editor</h1>
        </div>
        <div style="text-align: right;">
            <p style="margin: 0; font-size: 0.9rem; color: #666;">Total: {{ members|length }}</p>
        </div>
    </div>

    <div class="member-grid">
        {% for m in members %}
        {% set status = status_map.get(m.id|string, 'red') %}
        <a href="/admin/cards/{{ m.id }}" class="member-card">
            <div class="status-dot status-{{ status }}"></div>
            <div class="avatar">
                {% if m.photo_url %}
                    <img src="{{ m.photo_url }}" alt="{{ m.full_name }}">
                {% else %}
                    <span>{{ m.full_name[:2]|upper }}</span>
                {% endif %}
            </div>
            <div class="name">{{ m.full_name }}</div>
            <div class="classification">{{ m.classification or 'No Classification' }}</div>
        </a>
        {% endfor %}
    </div>
</body>
</html>
