version: "3.9"

services:
  app:
    build: .
    container_name: mahardika-app
    restart: unless-stopped
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - postgres
    networks:
      - mahardika-net

  postgres:
    image: postgres:16-alpine
    container_name: mahardika-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mahardika}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mahardika}
      POSTGRES_DB: ${POSTGRES_DB:-mahardika_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mahardika-net

  caddy:
    image: caddy:2-alpine
    container_name: mahardika-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./static:/srv/static
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    networks:
      - mahardika-net

networks:
  mahardika-net:
    driver: bridge

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
